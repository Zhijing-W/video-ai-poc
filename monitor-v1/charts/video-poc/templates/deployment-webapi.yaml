{{- if .Values.webapi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "video-poc.name" . }}-webapi
  labels:
    {{- include "video-poc.labels" . | nindent 4 }}
    component: webapi
spec:
  replicas: {{ .Values.webapi.replicaCount }}
  selector:
    matchLabels:
      {{- include "video-poc.selectorLabels" . | nindent 6 }}
      component: webapi
  template:
    metadata:
      labels:
        {{- include "video-poc.selectorLabels" . | nindent 8 }}
        component: webapi
        {{- with .Values.podLabels }}{{ toYaml . | nindent 8 }}{{ end }}
    spec:
      serviceAccountName: {{ include "video-poc.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.webapi.nodeSelector }}
      nodeSelector: {{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: webapi
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8000
        env:
        - name: FACE_DEVICE
          value: "{{ .Values.config.faceDevice }}"
        - name: REID_DEVICE
          value: "{{ .Values.config.reidDevice }}"
        - name: GAIT_DEVICE
          value: "{{ .Values.config.gaitDevice }}"
        - name: FACE_SUPERRES
          value: "{{ .Values.config.faceSuperres }}"
        - name: FACE_FIQA_BACKEND
          value: "{{ .Values.config.faceFiqaBackend }}"
        - name: OCR_ENABLED
          value: "{{ .Values.config.ocrEnabled }}"
        - name: AZURE_OPENAI_ENDPOINT
          value: "{{ .Values.config.azureOpenAI.endpoint }}"
        - name: AZURE_OPENAI_DEPLOYMENT
          value: "{{ .Values.config.azureOpenAI.deployment }}"
        {{- if .Values.appInsights.connectionString }}
        - name: APPLICATIONINSIGHTS_CONNECTION_STRING
          value: "{{ .Values.appInsights.connectionString }}"
        {{- end }}
        # 模型/数据/gallery 挂载路径（与 Dockerfile 内 ENV 一致）
        - name: INSIGHTFACE_HOME
          value: /models/insightface
        - name: TORCH_HOME
          value: /models/torch
        - name: HF_HOME
          value: /models/hf
        - name: GALLERY_DIR
          value: /gallery
        - name: DATA_DIR
          value: /data
        resources: {{ toYaml .Values.webapi.resources | nindent 10 }}
        livenessProbe:
          httpGet: { path: /docs, port: http }
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet: { path: /docs, port: http }
          initialDelaySeconds: 20
          periodSeconds: 10
        volumeMounts:
        - name: models
          mountPath: /models
          readOnly: true
        - name: datasets
          mountPath: /data
          readOnly: true
        - name: results
          mountPath: /results
        - name: gallery
          mountPath: /gallery
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: {{ include "video-poc.name" . }}-models
      - name: datasets
        persistentVolumeClaim:
          claimName: {{ include "video-poc.name" . }}-datasets
      - name: results
        persistentVolumeClaim:
          claimName: {{ include "video-poc.name" . }}-results
      - name: gallery
        persistentVolumeClaim:
          claimName: {{ include "video-poc.name" . }}-gallery
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "video-poc.name" . }}-webapi
  labels:
    {{- include "video-poc.labels" . | nindent 4 }}
spec:
  type: {{ .Values.webapi.service.type }}
  ports:
  - name: http
    port: {{ .Values.webapi.service.port }}
    targetPort: http
  selector:
    {{- include "video-poc.selectorLabels" . | nindent 4 }}
    component: webapi
{{- if .Values.webapi.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "video-poc.name" . }}-webapi
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "video-poc.name" . }}-webapi
  minReplicas: {{ .Values.webapi.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.webapi.autoscaling.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.webapi.autoscaling.targetCPU }}
{{- end }}
{{- end }}
