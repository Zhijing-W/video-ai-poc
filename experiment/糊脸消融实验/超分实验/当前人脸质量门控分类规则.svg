<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="2520" viewBox="0 0 1700 2520">
    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3"
              orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#605E5C"/>
      </marker>
    </defs>
    <rect width="100%" height="100%" fill="#ffffff"/>
    <style>text { font-family: "Microsoft YaHei", "Segoe UI", sans-serif; }</style>
    <text x="850.0" y="48" font-size="32" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="850.0" dy="0">人脸质量判定与身份匹配目标架构</tspan></text><text x="850.0" y="82" font-size="16" font-weight="400" text-anchor="middle" fill="#444444"><tspan x="850.0" dy="0">质量先于身份：完成质量分类后，才决定是否调用产品ArcFace / AdaFace</tspan></text><rect x="610" y="125" width="480" height="100" rx="14" fill="#EAF4FC" stroke="#0078D4" stroke-width="2.2"/><text x="850.0" y="159" font-size="21" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="850.0" dy="0">① 人物轨迹采样帧</tspan></text><text x="850.0" y="192" font-size="15" font-weight="400" text-anchor="middle" fill="#111111"><tspan x="850.0" dy="0">输入：RGB人物图像</tspan></text><polyline points="850,225 850,270" fill="none" stroke="#605E5C" stroke-width="2.4" marker-end="url(#arrow)"/><rect x="555" y="270" width="590" height="145" rx="14" fill="#EAF4FC" stroke="#0078D4" stroke-width="2.2"/><text x="850.0" y="304" font-size="21" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="850.0" dy="0">② SCRFD人脸检测</tspan></text><text x="850.0" y="337" font-size="15" font-weight="400" text-anchor="middle" fill="#111111"><tspan x="850.0" dy="0">输出：人脸框bbox、5点关键点、检测分数det_score</tspan><tspan x="850.0" dy="23">当前确认阈值：det_score ≥ 0.5</tspan></text><polyline points="850,415 850,455" fill="none" stroke="#605E5C" stroke-width="2.4" marker-end="url(#arrow)"/><polygon points="850,455.0 960.0,515 850,575.0 740.0,515" fill="#EAF4FC" stroke="#0078D4" stroke-width="2.2"/><text x="850" y="507" font-size="16" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="850" dy="0">检测到</tspan><tspan x="850" dy="21">人脸？</tspan></text><polyline points="960,515 1230,515" fill="none" stroke="#D13438" stroke-width="2.4" marker-end="url(#arrow)"/><text x="1090" y="494" font-size="14" font-weight="600" text-anchor="middle" fill="#333333"><tspan x="1090" dy="0">否</tspan></text><rect x="1230" y="440" width="390" height="155" rx="14" fill="#F3F2F1" stroke="#605E5C" stroke-width="2.2"/><text x="1425.0" y="474" font-size="21" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="1425.0" dy="0">none：人脸路线不可用</tspan></text><text x="1425.0" y="507" font-size="15" font-weight="400" text-anchor="middle" fill="#111111"><tspan x="1425.0" dy="0">不运行CR-FIQA和产品ArcFace</tspan><tspan x="1425.0" dy="23">人物轨迹仍然保留</tspan><tspan x="1425.0" dy="23">转人形、步态和事件理解</tspan></text><polyline points="850,575 850,620" fill="none" stroke="#605E5C" stroke-width="2.4" marker-end="url(#arrow)"/><text x="875" y="602" font-size="14" font-weight="600" text-anchor="middle" fill="#333333"><tspan x="875" dy="0">是</tspan></text><rect x="620" y="620" width="460" height="125" rx="14" fill="#EAF4FC" stroke="#0078D4" stroke-width="2.2"/><text x="850.0" y="654" font-size="21" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="850.0" dy="0">③ 五点关键点对齐</tspan></text><text x="850.0" y="687" font-size="15" font-weight="400" text-anchor="middle" fill="#111111"><tspan x="850.0" dy="0">输出同一张112×112对齐人脸</tspan><tspan x="850.0" dy="23">供质量分支与身份分支共用</tspan></text><rect x="70" y="800" width="1560" height="390" rx="20" fill="transparent" stroke="#5C2D91" stroke-width="2.8"/><text x="850.0" y="836" font-size="22" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="850.0" dy="0">④ 并行质量评估</tspan></text><text x="850.0" y="864" font-size="14" font-weight="400" text-anchor="middle" fill="#444444"><tspan x="850.0" dy="0">相同输入、独立计算；两条分支在质量合成前汇合</tspan></text><rect x="140" y="875" width="620" height="245" rx="14" fill="#F4ECFA" stroke="#5C2D91" stroke-width="2.2"/><text x="450.0" y="909" font-size="21" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="450.0" dy="0">CR-FIQA质量分支</tspan></text><text x="450.0" y="942" font-size="15" font-weight="400" text-anchor="middle" fill="#111111"><tspan x="450.0" dy="0">112×112对齐人脸 → 独立iResNet50 CNN</tspan><tspan x="450.0" dy="23">→ 512维内部质量embedding → 质量回归头</tspan><tspan x="450.0" dy="23">→ 连续身份识别可用性分数q</tspan><tspan x="450.0" dy="23">质量embedding在产品中丢弃，不进入人脸库</tspan></text><rect x="940" y="875" width="620" height="245" rx="14" fill="#FFF4CE" stroke="#F7630C" stroke-width="2.2"/><text x="1250.0" y="909" font-size="21" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="1250.0" dy="0">显式规则分支</tspan></text><text x="1250.0" y="942" font-size="15" font-weight="400" text-anchor="middle" fill="#111111"><tspan x="1250.0" dy="0">检测可信度：det_score    尺寸：最小边 / 面积</tspan><tspan x="1250.0" dy="23">姿态：yaw / pitch        清晰度：拉普拉斯方差</tspan><tspan x="1250.0" dy="23">输出：small_face / blur / extreme_pose等子标签</tspan></text><path d="M 850 745 C 800 815, 560 825, 450 875" fill="none" stroke="#605E5C" stroke-width="2.4" marker-end="url(#arrow)"/><path d="M 850 745 C 900 815, 1140 825, 1250 875" fill="none" stroke="#605E5C" stroke-width="2.4" marker-end="url(#arrow)"/><rect x="500" y="1210" width="700" height="190" rx="14" fill="#EAF6EA" stroke="#107C10" stroke-width="2.2"/><text x="850.0" y="1244" font-size="21" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="850.0" dy="0">⑤ 质量合成与动作生成</tspan></text><text x="850.0" y="1277" font-size="15" font-weight="400" text-anchor="middle" fill="#111111"><tspan x="850.0" dy="0">规则硬失败或q &lt; 0.3 → poor</tspan><tspan x="850.0" dy="23">规则全部清晰且q ≥ 0.6 → clear；其余 → marginal</tspan><tspan x="850.0" dy="23">同时输出：defects、can_enroll、can_match、can_superres</tspan></text><path d="M 450 1120 C 500 1165, 610 1180, 700 1210" fill="none" stroke="#605E5C" stroke-width="2.4" marker-end="url(#arrow)"/><path d="M 1250 1120 C 1200 1165, 1090 1180, 1000 1210" fill="none" stroke="#605E5C" stroke-width="2.4" marker-end="url(#arrow)"/><rect x="70" y="1450" width="1560" height="390" rx="20" fill="transparent" stroke="#107C10" stroke-width="2.8"/><text x="850.0" y="1486" font-size="22" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="850.0" dy="0">⑥ 检测到人脸后的分类结果</tspan></text><text x="850.0" y="1514" font-size="14" font-weight="400" text-anchor="middle" fill="#444444"><tspan x="850.0" dy="0">none已在SCRFD失败分支结束；三类结果统一进入动作字段</tspan></text><rect x="125" y="1550" width="410" height="190" rx="14" fill="#EAF6EA" stroke="#107C10" stroke-width="2.2"/><text x="330.0" y="1584" font-size="21" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="330.0" dy="0">clear</tspan></text><text x="330.0" y="1617" font-size="15" font-weight="400" text-anchor="middle" fill="#111111"><tspan x="330.0" dy="0">can_enroll=true</tspan><tspan x="330.0" dy="23">can_match=true</tspan><tspan x="330.0" dy="23">can_superres=false</tspan></text><rect x="645" y="1550" width="410" height="190" rx="14" fill="#FFF4CE" stroke="#F7630C" stroke-width="2.2"/><text x="850.0" y="1584" font-size="21" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="850.0" dy="0">marginal</tspan></text><text x="850.0" y="1617" font-size="15" font-weight="400" text-anchor="middle" fill="#111111"><tspan x="850.0" dy="0">can_match=true，按q降低身份权重</tspan><tspan x="850.0" dy="23">有模糊 / 小脸标签时可超分</tspan></text><rect x="1165" y="1550" width="410" height="190" rx="14" fill="#FDE7E9" stroke="#D13438" stroke-width="2.2"/><text x="1370.0" y="1584" font-size="21" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="1370.0" dy="0">poor + defects</tspan></text><text x="1370.0" y="1617" font-size="15" font-weight="400" text-anchor="middle" fill="#111111"><tspan x="1370.0" dy="0">模糊 / 小脸：可低权重匹配或超分</tspan><tspan x="1370.0" dy="23">极端姿态：can_match=false</tspan></text><path d="M 850 1400 C 730 1450, 470 1485, 330 1550" fill="none" stroke="#605E5C" stroke-width="2.4" marker-end="url(#arrow)"/><polyline points="850,1400 850,1550" fill="none" stroke="#605E5C" stroke-width="2.4" marker-end="url(#arrow)"/><path d="M 850 1400 C 970 1450, 1230 1485, 1370 1550" fill="none" stroke="#605E5C" stroke-width="2.4" marker-end="url(#arrow)"/><rect x="260" y="1770" width="1180" height="80" rx="14" fill="#EAF6EA" stroke="#107C10" stroke-width="2.2"/><text x="850.0" y="1804" font-size="19" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="850.0" dy="0">统一动作字段</tspan></text><text x="850.0" y="1837" font-size="15" font-weight="400" text-anchor="middle" fill="#111111"><tspan x="850.0" dy="0">分类结果 + defects → can_enroll / can_match / can_superres / match_weight</tspan></text><polyline points="330,1740 330,1770" fill="none" stroke="#605E5C" stroke-width="2.4" marker-end="url(#arrow)"/><polyline points="850,1740 850,1770" fill="none" stroke="#605E5C" stroke-width="2.4" marker-end="url(#arrow)"/><polyline points="1370,1740 1370,1770" fill="none" stroke="#605E5C" stroke-width="2.4" marker-end="url(#arrow)"/><polyline points="850,1850 850,1890" fill="none" stroke="#605E5C" stroke-width="2.4" marker-end="url(#arrow)"/><polygon points="850,1887.5 970.0,1950 850,2012.5 730.0,1950" fill="#EAF6EA" stroke="#107C10" stroke-width="2.2"/><text x="850" y="1942" font-size="16" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="850" dy="0">can_match</tspan><tspan x="850" dy="21">= true？</tspan></text><polyline points="730,1950 410,1950" fill="none" stroke="#D13438" stroke-width="2.4" marker-end="url(#arrow)"/><text x="570" y="1928" font-size="14" font-weight="600" text-anchor="middle" fill="#333333"><tspan x="570" dy="0">否</tspan></text><rect x="85" y="1880" width="325" height="150" rx="14" fill="#F3F2F1" stroke="#605E5C" stroke-width="2.2"/><text x="247.5" y="1914" font-size="21" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="247.5" dy="0">停止人脸身份匹配</tspan></text><text x="247.5" y="1947" font-size="15" font-weight="400" text-anchor="middle" fill="#111111"><tspan x="247.5" dy="0">不调用产品ArcFace / AdaFace</tspan><tspan x="247.5" dy="23">保留人物与事件信息</tspan><tspan x="247.5" dy="23">转人形 / 步态路线</tspan></text><polyline points="850,2012 850,2050" fill="none" stroke="#605E5C" stroke-width="2.4" marker-end="url(#arrow)"/><text x="875" y="2035" font-size="14" font-weight="600" text-anchor="middle" fill="#333333"><tspan x="875" dy="0">是</tspan></text><polygon points="850,2050.0 985.0,2110 850,2170.0 715.0,2110" fill="#F4ECFA" stroke="#5C2D91" stroke-width="2.2"/><text x="850" y="2102" font-size="16" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="850" dy="0">can_superres</tspan><tspan x="850" dy="21">= true？</tspan></text><polyline points="715,2110 470,2110" fill="none" stroke="#605E5C" stroke-width="2.4" marker-end="url(#arrow)"/><text x="595" y="2088" font-size="14" font-weight="600" text-anchor="middle" fill="#333333"><tspan x="595" dy="0">否：使用原图</tspan></text><rect x="155" y="2050" width="315" height="125" rx="14" fill="#E6F7F9" stroke="#0C8599" stroke-width="2.2"/><text x="312.5" y="2084" font-size="21" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="312.5" dy="0">原始对齐人脸</tspan></text><text x="312.5" y="2117" font-size="15" font-weight="400" text-anchor="middle" fill="#111111"><tspan x="312.5" dy="0">不执行超分</tspan></text><polyline points="985,2110 1170,2110" fill="none" stroke="#5C2D91" stroke-width="2.4" marker-end="url(#arrow)"/><text x="1080" y="2088" font-size="14" font-weight="600" text-anchor="middle" fill="#333333"><tspan x="1080" dy="0">是</tspan></text><rect x="1170" y="2025" width="390" height="175" rx="14" fill="#F4ECFA" stroke="#5C2D91" stroke-width="2.2" stroke-dasharray="8 5"/><text x="1365.0" y="2059" font-size="21" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="1365.0" dy="0">可选超分与复评</tspan></text><text x="1365.0" y="2092" font-size="15" font-weight="400" text-anchor="middle" fill="#111111"><tspan x="1365.0" dy="0">GFPGAN / CodeFormer</tspan><tspan x="1365.0" dy="23">修复后重新计算CR-FIQA</tspan><tspan x="1365.0" dy="23">检查身份embedding漂移</tspan></text><polyline points="312,2175 312,2240 850,2240" fill="none" stroke="#605E5C" stroke-width="2.2"/><polyline points="1365,2200 1365,2240 850,2240" fill="none" stroke="#605E5C" stroke-width="2.2"/><circle cx="850" cy="2240" r="6" fill="#E6F7F9" stroke="#0C8599" stroke-width="2"/><polyline points="850,2240 850,2280" fill="none" stroke="#605E5C" stroke-width="2.4" marker-end="url(#arrow)"/><rect x="520" y="2280" width="660" height="130" rx="14" fill="#E6F7F9" stroke="#0C8599" stroke-width="2.2"/><text x="850.0" y="2314" font-size="21" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="850.0" dy="0">⑦ 产品ArcFace / AdaFace身份分支</tspan></text><text x="850.0" y="2347" font-size="15" font-weight="400" text-anchor="middle" fill="#111111"><tspan x="850.0" dy="0">输出512维身份embedding → 与人脸库计算余弦相似度 → 固定阈值决定是否复用身份</tspan></text><text x="850.0" y="2475" font-size="15" font-weight="600" text-anchor="middle" fill="#444444"><tspan x="850.0" dy="0">CR-FIQA的512维内部特征只服务质量回归；产品ArcFace / AdaFace的512维特征只服务身份匹配，两者不可混用。</tspan></text></svg>