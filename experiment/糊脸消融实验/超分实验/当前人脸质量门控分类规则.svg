<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1360" viewBox="0 0 1900 1360">
    <rect width="100%" height="100%" fill="#FFFFFF"/>
    <style>text { font-family: "Microsoft YaHei", "Segoe UI", sans-serif; }</style>
    <text x="950.0" y="48" font-size="31" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="950.0" dy="0">当前人脸质量门控：输入信号、阈值、总体等级与子标签</tspan></text><text x="950.0" y="82" font-size="14" font-weight="400" text-anchor="middle" fill="#444444"><tspan x="950.0" dy="0">依据 event-monitor/app/face.py 与 app/core/config.py 当前实现；虚线紫框表示已预留但尚未生效</tspan></text><rect x="35" y="115" width="1830" height="455" rx="20" fill="transparent" stroke="#0078D4" stroke-width="3"/><text x="57" y="150" font-size="22" font-weight="700" text-anchor="start" fill="#111111"><tspan x="57" dy="0">① 质量判定输入维度</tspan></text><text x="57" y="176" font-size="13" font-weight="400" text-anchor="start" fill="#444444"><tspan x="57" dy="0">同一张检测到的人脸同时计算；每个维度独立产生状态或问题标签</tspan></text><rect x="60" y="185" width="270" height="360" rx="14" fill="#CFE4FA" stroke="#0078D4" stroke-width="2"/><text x="195.0" y="216" font-size="19" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="195.0" dy="0">人脸检测可信度</tspan></text><text x="75" y="247" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="75" dy="0">没有检测到脸</tspan><tspan x="75" dy="23">→ 总体等级 none</tspan><tspan x="75" dy="23"></tspan><tspan x="75" dy="23">det_score &lt; 0.5</tspan><tspan x="75" dy="23">→ blur_bad = true</tspan><tspan x="75" dy="23">→ poor候选</tspan><tspan x="75" dy="23"></tspan><tspan x="75" dy="23">det_score ≥ 0.5</tspan><tspan x="75" dy="23">→ 检测可信</tspan></text><rect x="355" y="185" width="270" height="360" rx="14" fill="#FFF4CE" stroke="#F7630C" stroke-width="2"/><text x="490.0" y="216" font-size="19" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="490.0" dy="0">人脸尺寸</tspan></text><text x="370" y="247" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="370" dy="0">最小边 &lt; 28像素</tspan><tspan x="370" dy="23">→ size_bad = true</tspan><tspan x="370" dy="23">→ poor</tspan><tspan x="370" dy="23">→ 子标签 too_small</tspan><tspan x="370" dy="23"></tspan><tspan x="370" dy="23">最小边 ≥ 28像素</tspan><tspan x="370" dy="23">→ 尺寸通过</tspan><tspan x="370" dy="23"></tspan><tspan x="370" dy="23">面积还参与quality_score</tspan></text><rect x="650" y="185" width="270" height="360" rx="14" fill="#FFF4CE" stroke="#F7630C" stroke-width="2"/><text x="785.0" y="216" font-size="19" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="785.0" dy="0">水平转头 yaw</tspan></text><text x="665" y="247" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="665" dy="0">|yaw| ≤ 25°</tspan><tspan x="665" dy="23">→ 角度清晰</tspan><tspan x="665" dy="23"></tspan><tspan x="665" dy="23">25° &lt; |yaw| &lt; 80°</tspan><tspan x="665" dy="23">→ 非清晰但未硬失败</tspan><tspan x="665" dy="23">→ 可能进入 marginal</tspan><tspan x="665" dy="23"></tspan><tspan x="665" dy="23">|yaw| ≥ 80°</tspan><tspan x="665" dy="23">→ poor / yaw_extreme</tspan></text><rect x="945" y="185" width="270" height="360" rx="14" fill="#FFF4CE" stroke="#F7630C" stroke-width="2"/><text x="1080.0" y="216" font-size="19" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="1080.0" dy="0">抬头低头 pitch</tspan></text><text x="960" y="247" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="960" dy="0">|pitch| ≤ 20°</tspan><tspan x="960" dy="23">→ 角度清晰</tspan><tspan x="960" dy="23"></tspan><tspan x="960" dy="23">-35° &lt; pitch &lt; -20°</tspan><tspan x="960" dy="23">或 20° &lt; pitch &lt; 50°</tspan><tspan x="960" dy="23">→ 可能进入 marginal</tspan><tspan x="960" dy="23"></tspan><tspan x="960" dy="23">pitch ≤ -35° → pitch_down</tspan><tspan x="960" dy="23">pitch ≥ 50° → pitch_up</tspan></text><rect x="1240" y="185" width="270" height="360" rx="14" fill="#C5F0F5" stroke="#0C8599" stroke-width="2"/><text x="1375.0" y="216" font-size="19" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="1375.0" dy="0">拉普拉斯清晰度</tspan></text><text x="1255" y="247" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="1255" dy="0">blur_var &lt; 15</tspan><tspan x="1255" dy="23">→ blur_bad = true</tspan><tspan x="1255" dy="23">→ poor / too_blurry</tspan><tspan x="1255" dy="23"></tspan><tspan x="1255" dy="23">15 ≤ blur_var &lt; 60</tspan><tspan x="1255" dy="23">→ 不算硬失败</tspan><tspan x="1255" dy="23">→ 但不满足清晰条件</tspan><tspan x="1255" dy="23"></tspan><tspan x="1255" dy="23">blur_var ≥ 60</tspan><tspan x="1255" dy="23">→ 清晰度通过</tspan></text><rect x="1535" y="185" width="270" height="360" rx="14" fill="#E8DAEF" stroke="#5C2D91" stroke-width="2" stroke-dasharray="9 6"/><text x="1670.0" y="216" font-size="19" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="1670.0" dy="0">公开FIQA（未生效）</tspan></text><text x="1550" y="247" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="1550" dy="0">配置：FACE_FIQA_BACKEND</tspan><tspan x="1550" dy="23">当前默认 off</tspan><tspan x="1550" dy="23">_deep_fiqa_score返回None</tspan><tspan x="1550" dy="23"></tspan><tspan x="1550" dy="23">计划阈值：</tspan><tspan x="1550" dy="23">FIQA &lt; 0.3 → poor信号</tspan><tspan x="1550" dy="23">0.3～0.6 → 非清晰</tspan><tspan x="1550" dy="23">FIQA ≥ 0.6 → 清晰</tspan><tspan x="1550" dy="23"></tspan><tspan x="1550" dy="23">应在5点对齐脸上推理</tspan></text><rect x="35" y="600" width="1830" height="220" rx="20" fill="transparent" stroke="#F7630C" stroke-width="3"/><text x="57" y="635" font-size="22" font-weight="700" text-anchor="start" fill="#111111"><tspan x="57" dy="0">② 总体等级组合规则</tspan></text><text x="57" y="661" font-size="13" font-weight="400" text-anchor="start" fill="#444444"><tspan x="57" dy="0">总体等级是单值；具体问题应保留为可同时存在的子标签</tspan></text><rect x="70" y="670" width="510" height="115" rx="14" fill="#FDE7E9" stroke="#D13438" stroke-width="2"/><text x="325.0" y="701" font-size="18" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="325.0" dy="0">poor：任一硬失败</tspan></text><text x="85" y="732" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="85" dy="0">yaw_bad OR pitch_bad OR blur_bad OR size_bad</tspan></text><rect x="695" y="670" width="510" height="115" rx="14" fill="#DFF6DD" stroke="#107C10" stroke-width="2"/><text x="950.0" y="701" font-size="18" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="950.0" dy="0">clear：全部清晰</tspan></text><text x="710" y="732" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="710" dy="0">angle_clear AND blur_clear AND NOT size_bad</tspan></text><rect x="1320" y="670" width="510" height="115" rx="14" fill="#FFF4CE" stroke="#F7630C" stroke-width="2"/><text x="1575.0" y="701" font-size="18" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="1575.0" dy="0">marginal：其余情况</tspan></text><text x="1335" y="732" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="1335" dy="0">没有硬失败，但至少一个维度未达到clear</tspan></text><rect x="35" y="850" width="1830" height="360" rx="20" fill="transparent" stroke="#107C10" stroke-width="3"/><text x="57" y="885" font-size="22" font-weight="700" text-anchor="start" fill="#111111"><tspan x="57" dy="0">③ 最终四类输出与子标签</tspan></text><text x="57" y="911" font-size="13" font-weight="400" text-anchor="start" fill="#444444"><tspan x="57" dy="0">当前category只有一个值；建议defects保留所有同时存在的问题</tspan></text><rect x="65" y="920" width="410" height="245" rx="14" fill="#DFF6DD" stroke="#107C10" stroke-width="2"/><text x="270.0" y="951" font-size="19" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="270.0" dy="0">clear</tspan></text><text x="80" y="982" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="80" dy="0">检测到脸</tspan><tspan x="80" dy="23">尺寸 ≥ 28像素</tspan><tspan x="80" dy="23">|yaw| ≤ 25°</tspan><tspan x="80" dy="23">|pitch| ≤ 20°</tspan><tspan x="80" dy="23">blur_var ≥ 60</tspan><tspan x="80" dy="23">若FIQA启用：FIQA ≥ 0.6</tspan><tspan x="80" dy="23"></tspan><tspan x="80" dy="23">当前动作：可建档、可匹配</tspan></text><rect x="505" y="920" width="410" height="245" rx="14" fill="#FFF4CE" stroke="#F7630C" stroke-width="2"/><text x="710.0" y="951" font-size="19" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="710.0" dy="0">marginal</tspan></text><text x="520" y="982" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="520" dy="0">没有触发任何poor硬条件</tspan><tspan x="520" dy="23">但角度或清晰度未达到clear</tspan><tspan x="520" dy="23"></tspan><tspan x="520" dy="23">典型示例：</tspan><tspan x="520" dy="23">yaw=40°，其他条件正常</tspan><tspan x="520" dy="23">blur_var=35，其他条件正常</tspan><tspan x="520" dy="23"></tspan><tspan x="520" dy="23">当前动作：匹配时降权</tspan></text><rect x="945" y="920" width="410" height="245" rx="14" fill="#FDE7E9" stroke="#D13438" stroke-width="2"/><text x="1150.0" y="951" font-size="19" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="1150.0" dy="0">poor + 子标签</tspan></text><text x="960" y="982" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="960" dy="0">任意硬条件失败即进入poor</tspan><tspan x="960" dy="23"></tspan><tspan x="960" dy="23">建议子标签可同时存在：</tspan><tspan x="960" dy="23">too_small</tspan><tspan x="960" dy="23">yaw_extreme</tspan><tspan x="960" dy="23">pitch_down / pitch_up</tspan><tspan x="960" dy="23">too_blurry / low_detection</tspan><tspan x="960" dy="23">fiqa_low（接入后）</tspan></text><rect x="1385" y="920" width="410" height="245" rx="14" fill="#F3F2F1" stroke="#605E5C" stroke-width="2"/><text x="1590.0" y="951" font-size="19" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="1590.0" dy="0">none</tspan></text><text x="1400" y="982" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="1400" dy="0">人脸检测结果为空</tspan><tspan x="1400" dy="23"></tspan><tspan x="1400" dy="23">不代表人物不存在</tspan><tspan x="1400" dy="23">只表示人脸路线不可用</tspan><tspan x="1400" dy="23"></tspan><tspan x="1400" dy="23">人物轨迹、人形ReID、步态</tspan><tspan x="1400" dy="23">和事件理解继续运行</tspan></text><rect x="35" y="1240" width="890" height="85" rx="14" fill="#F3F2F1" stroke="#605E5C" stroke-width="2"/><text x="480.0" y="1271" font-size="16" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="480.0" dy="0">当前实现限制</tspan></text><text x="50" y="1302" font-size="13" font-weight="400" text-anchor="start" fill="#111111"><tspan x="50" dy="0">reason只按优先级保留一个：too_small → yaw → pitch → blur，会隐藏同时存在的问题。</tspan></text><rect x="975" y="1240" width="890" height="85" rx="14" fill="#C5F0F5" stroke="#0C8599" stroke-width="2"/><text x="1420.0" y="1271" font-size="16" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="1420.0" dy="0">连续quality_score的用途</tspan></text><text x="990" y="1302" font-size="13" font-weight="400" text-anchor="start" fill="#111111"><tspan x="990" dy="0">det_score × 正脸度 × 尺寸项 × 清晰度项；用于最佳脸选择和融合降权，不直接替代category。</tspan></text></svg>