# Azure Blob CSI 静态 PV/PVC —— pod 挂 /models、/data、/results
# 用 AAD/Managed Identity 认证（AKS kubelet MI 已在 Bicep 里授权 Blob Owner）
{{- range $key, $cfg := (dict "models" .Values.storage.models "datasets" .Values.storage.datasets "results" .Values.storage.results) }}
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ include "video-poc.name" $ }}-{{ $key }}
  labels:
    {{- include "video-poc.labels" $ | nindent 4 }}
spec:
  capacity:
    storage: 1000Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: azureblob-fuse-premium
  mountOptions:
    - -o allow_other
    - --file-cache-timeout-in-seconds=120
    {{- if $cfg.readOnly }}
    - -o ro
    {{- end }}
  csi:
    driver: blob.csi.azure.com
    volumeHandle: {{ include "video-poc.name" $ }}-{{ $key }}
    volumeAttributes:
      resourceGroup: {{ $.Release.Namespace }}
      storageAccount: {{ $.Values.storage.blobAccount }}
      containerName: {{ $cfg.container }}
      protocol: fuse2
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "video-poc.name" $ }}-{{ $key }}
  namespace: {{ $.Release.Namespace }}
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: azureblob-fuse-premium
  resources:
    requests:
      storage: 1000Gi
  volumeName: {{ include "video-poc.name" $ }}-{{ $key }}
{{- end }}

---
# gallery 用 Azure Files（多 pod 共享读写；FAISS + K/V 元数据）
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ include "video-poc.name" . }}-gallery
  labels:
    {{- include "video-poc.labels" . | nindent 4 }}
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: azurefile-csi-premium
  csi:
    driver: file.csi.azure.com
    volumeHandle: {{ include "video-poc.name" . }}-gallery
    volumeAttributes:
      resourceGroup: {{ .Release.Namespace }}
      storageAccount: {{ .Values.storage.filesAccount }}
      shareName: {{ .Values.storage.gallery.share }}
      protocol: smb
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "video-poc.name" . }}-gallery
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: azurefile-csi-premium
  resources:
    requests:
      storage: 100Gi
  volumeName: {{ include "video-poc.name" . }}-gallery
