{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "video-poc.name" . }}
  labels:
    {{- include "video-poc.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className }}
spec:
  {{- if .Values.ingress.host }}
  rules:
  - host: {{ .Values.ingress.host }}
    http:
      paths:
      - path: {{ .Values.ingress.path }}
        pathType: Prefix
        backend:
          service:
            name: {{ include "video-poc.name" . }}-webapi
            port:
              number: {{ .Values.webapi.service.port }}
  {{- else }}
  # 无域名：ingress controller 分配一个 IP，直接访问
  defaultBackend:
    service:
      name: {{ include "video-poc.name" . }}-webapi
      port:
        number: {{ .Values.webapi.service.port }}
  {{- end }}
{{- end }}
