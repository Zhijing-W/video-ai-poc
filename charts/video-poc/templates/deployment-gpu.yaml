{{- if .Values.gpu.enabled }}
# GPU 推理服务：GPU 配额批下来 + gpupool 加好后开
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "video-poc.name" . }}-gpu
  labels:
    {{- include "video-poc.labels" . | nindent 4 }}
    component: gpu
spec:
  replicas: {{ .Values.gpu.replicaCount }}
  selector:
    matchLabels:
      {{- include "video-poc.selectorLabels" . | nindent 6 }}
      component: gpu
  template:
    metadata:
      labels:
        {{- include "video-poc.selectorLabels" . | nindent 8 }}
        component: gpu
    spec:
      serviceAccountName: {{ include "video-poc.serviceAccountName" . }}
      {{- with .Values.gpu.nodeSelector }}
      nodeSelector: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gpu.tolerations }}
      tolerations: {{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: gpu-inference
        image: "{{ .Values.gpu.image.repository }}:{{ .Values.gpu.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8000
        env:
        - name: FACE_DEVICE
          value: cuda
        - name: REID_DEVICE
          value: cuda
        - name: GAIT_DEVICE
          value: cuda
        - name: FACE_SUPERRES
          value: gfpgan
        - name: OCR_ENABLED
          value: "false"           # OCR 让 CPU pod 干，GPU pod 只做人脸/步态/ReID
        - name: INSIGHTFACE_HOME
          value: /models/insightface
        - name: TORCH_HOME
          value: /models/torch
        - name: HF_HOME
          value: /models/hf
        - name: GALLERY_DIR
          value: /gallery
        - name: YOLO_MODEL
          value: /models/yolov8m.pt
        - name: POSE_MODEL
          value: /models/yolov8n-pose.pt
        {{- if .Values.appInsights.connectionString }}
        - name: APPLICATIONINSIGHTS_CONNECTION_STRING
          value: "{{ .Values.appInsights.connectionString }}"
        {{- end }}
        resources: {{ toYaml .Values.gpu.resources | nindent 10 }}
        livenessProbe:
          httpGet: { path: /docs, port: http }
          initialDelaySeconds: 120
          periodSeconds: 30
        readinessProbe:
          httpGet: { path: /docs, port: http }
          initialDelaySeconds: 60
          periodSeconds: 10
        volumeMounts:
        - name: models
          mountPath: /models
          readOnly: true
        - name: gallery
          mountPath: /gallery
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: {{ include "video-poc.name" . }}-models
      - name: gallery
        persistentVolumeClaim:
          claimName: {{ include "video-poc.name" . }}-gallery
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "video-poc.name" . }}-gpu
  labels:
    {{- include "video-poc.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
  selector:
    {{- include "video-poc.selectorLabels" . | nindent 4 }}
    component: gpu
{{- if .Values.gpu.autoscaling.enabled }}
---
# GPU pod HPA：minReplicas=0 需 KEDA；用普通 HPA 时 minReplicas 至少 1
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "video-poc.name" . }}-gpu
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "video-poc.name" . }}-gpu
  minReplicas: {{ max .Values.gpu.autoscaling.minReplicas 1 }}
  maxReplicas: {{ .Values.gpu.autoscaling.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.gpu.autoscaling.targetCPU }}
{{- end }}
{{- end }}
