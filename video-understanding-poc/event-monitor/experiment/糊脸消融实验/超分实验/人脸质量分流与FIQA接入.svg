<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1450" viewBox="0 0 1900 1450">
    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3"
              orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#605E5C"/>
      </marker>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.13"/>
      </filter>
    </defs>
    <rect width="100%" height="100%" fill="#FFFFFF"/>
    <style>text { font-family: "Microsoft YaHei", "Segoe UI", sans-serif; }</style>
    <text x="950.0" y="48" font-size="31" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="950.0" dy="0">人脸质量分流、超分动作与FIQA接入位置</tspan></text><text x="950.0" y="80" font-size="15" font-weight="400" text-anchor="middle" fill="#444444"><tspan x="950.0" dy="0">唯一质量评估源 → 多维问题标签 → 动作决策；none只关闭人脸路线，不丢弃人物轨迹</tspan></text><rect x="40" y="120" width="340" height="500" rx="20" fill="transparent" stroke="#0078D4" stroke-width="3"/><text x="60" y="154" font-size="22" font-weight="700" text-anchor="start" fill="#111111"><tspan x="60" dy="0">① 人物帧与人脸检测</tspan></text><text x="60" y="180" font-size="13" font-weight="400" text-anchor="start" fill="#444444"><tspan x="60" dy="0">当前已实现</tspan></text><rect x="70" y="190" width="280" height="95" rx="14" fill="#CFE4FA" stroke="#0078D4" stroke-width="2"/><text x="210.0" y="221" font-size="19" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="210.0" dy="0">人物轨迹采样帧</tspan></text><text x="88" y="250" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="88" dy="0">原始监控人物crop / 全帧中的人物区域</tspan></text><path d="M 210 285 L 210 320" fill="none" stroke="#605E5C" stroke-width="2.5" marker-end="url(#arrow)"/><rect x="70" y="320" width="280" height="115" rx="14" fill="#CFE4FA" stroke="#0078D4" stroke-width="2"/><text x="210.0" y="351" font-size="19" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="210.0" dy="0">SCRFD人脸检测</tspan></text><text x="88" y="380" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="88" dy="0">输出bbox、5点关键点、det_score</tspan><tspan x="88" dy="22">没有检测到脸 → face_status=unavailable</tspan></text><path d="M 210 435 L 210 475" fill="none" stroke="#605E5C" stroke-width="2.5" marker-end="url(#arrow)"/><text x="210.0" y="447.0" font-size="13" font-weight="600" text-anchor="middle" fill="#333333"><tspan x="210.0" dy="0">检测成功</tspan></text><rect x="70" y="475" width="280" height="110" rx="14" fill="#CFE4FA" stroke="#0078D4" stroke-width="2"/><text x="210.0" y="506" font-size="19" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="210.0" dy="0">5点对齐人脸</tspan></text><text x="88" y="535" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="88" dy="0">对齐为112×112</tspan><tspan x="88" dy="22">供ArcFace / AdaFace / FIQA / 超分使用</tspan></text><rect x="40" y="680" width="340" height="170" rx="14" fill="#F3F2F1" stroke="#605E5C" stroke-width="2"/><text x="210.0" y="711" font-size="19" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="210.0" dy="0">未检测到脸（none）</tspan></text><text x="58" y="740" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="58" dy="0">不建人脸参考特征</tspan><tspan x="58" dy="22">不做人脸身份匹配</tspan><tspan x="58" dy="22">当前人脸裁剪超分无法运行</tspan><tspan x="58" dy="22">人物轨迹仍保留</tspan></text><path d="M 70 390 L 40 720" fill="none" stroke="#D13438" stroke-width="2.5" marker-end="url(#arrow)"/><text x="55.0" y="547.0" font-size="13" font-weight="600" text-anchor="middle" fill="#333333"><tspan x="55.0" dy="0">检测失败</tspan></text><rect x="420" y="120" width="650" height="650" rx="20" fill="transparent" stroke="#F7630C" stroke-width="3"/><text x="440" y="154" font-size="22" font-weight="700" text-anchor="start" fill="#111111"><tspan x="440" dy="0">② 唯一的人脸质量评估</tspan></text><text x="440" y="180" font-size="13" font-weight="400" text-anchor="start" fill="#444444"><tspan x="440" dy="0">总体等级 + 可同时存在的问题标签</tspan></text><rect x="450" y="190" width="285" height="180" rx="14" fill="#FFF4CE" stroke="#F7630C" stroke-width="2"/><text x="592.5" y="221" font-size="19" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="592.5" dy="0">当前规则信号</tspan></text><text x="468" y="250" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="468" dy="0">人脸尺寸：bbox宽高、面积</tspan><tspan x="468" dy="22">清晰度：拉普拉斯方差</tspan><tspan x="468" dy="22">检测可信度：det_score</tspan><tspan x="468" dy="22">姿态：5点近似yaw / pitch</tspan><tspan x="468" dy="22">正脸程度：frontalness</tspan></text><rect x="755" y="190" width="285" height="180" rx="14" fill="#E8DAEF" stroke="#5C2D91" stroke-width="2" stroke-dasharray="9 6"/><text x="897.5" y="221" font-size="19" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="897.5" dy="0">公开FIQA（计划接入）</tspan></text><text x="773" y="250" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="773" dy="0">CR-FIQA / SER-FIQ / OFIQ</tspan><tspan x="773" dy="22">输入：检测并对齐后的人脸crop</tspan><tspan x="773" dy="22">输出：身份识别可用性总分</tspan><tspan x="773" dy="22">当前_deep_fiqa_score仍返回None</tspan></text><path d="M 735 280 L 755 280" fill="none" stroke="#5C2D91" stroke-width="2.5" marker-end="url(#arrow)" stroke-dasharray="6 5"/><text x="745.0" y="272.0" font-size="13" font-weight="600" text-anchor="middle" fill="#333333"><tspan x="745.0" dy="0">并行信号</tspan></text><path d="M 592 370 L 592 415" fill="none" stroke="#605E5C" stroke-width="2.5" marker-end="url(#arrow)"/><path d="M 897 370 L 897 415" fill="none" stroke="#605E5C" stroke-width="2.5" marker-end="url(#arrow)"/><rect x="485" y="415" width="520" height="155" rx="14" fill="#FFF4CE" stroke="#F7630C" stroke-width="2"/><text x="745.0" y="446" font-size="19" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="745.0" dy="0">统一质量合成 assess_quality()</tspan></text><text x="503" y="475" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="503" dy="0">总体等级：clear / marginal / poor</tspan><tspan x="503" dy="22">问题标签：blur / small_face / extreme_yaw / extreme_pitch / occlusion ...</tspan><tspan x="503" dy="22">动作字段：can_enroll / can_match / can_superres</tspan></text><path d="M 745 570 L 745 615" fill="none" stroke="#605E5C" stroke-width="2.5" marker-end="url(#arrow)"/><rect x="485" y="615" width="520" height="120" rx="14" fill="#FFF4CE" stroke="#F7630C" stroke-width="2"/><text x="745.0" y="646" font-size="19" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="745.0" dy="0">保留原始质量证据</tspan></text><text x="503" y="675" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="503" dy="0">原图分桶始终不因超分改变</tspan><tspan x="503" dy="22">用于实验分析、门控解释和坏案例追踪</tspan></text><path d="M 350 530 L 450 280" fill="none" stroke="#605E5C" stroke-width="2.5" marker-end="url(#arrow)"/><text x="400.0" y="397.0" font-size="13" font-weight="600" text-anchor="middle" fill="#333333"><tspan x="400.0" dy="0">检测结果</tspan></text><rect x="1110" y="120" width="750" height="650" rx="20" fill="transparent" stroke="#107C10" stroke-width="3"/><text x="1130" y="154" font-size="22" font-weight="700" text-anchor="start" fill="#111111"><tspan x="1130" dy="0">③ 根据同一质量结果选择动作</tspan></text><text x="1130" y="180" font-size="13" font-weight="400" text-anchor="start" fill="#444444"><tspan x="1130" dy="0">不是第二套质量评分</tspan></text><rect x="1140" y="190" width="690" height="84" rx="14" fill="#DFF6DD" stroke="#107C10" stroke-width="2"/><text x="1485.0" y="221" font-size="18" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="1485.0" dy="0">clear</tspan></text><text x="1158" y="250" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="1158" dy="0">建档：是    匹配：是    超分：否</tspan></text><rect x="1140" y="293" width="690" height="84" rx="14" fill="#FFF4CE" stroke="#F7630C" stroke-width="2"/><text x="1485.0" y="324" font-size="18" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="1485.0" dy="0">marginal + blur</tspan></text><text x="1158" y="353" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="1158" dy="0">建档：谨慎/否    匹配：降权    超分：可尝试</tspan></text><rect x="1140" y="396" width="690" height="84" rx="14" fill="#FFF4CE" stroke="#F7630C" stroke-width="2"/><text x="1485.0" y="427" font-size="18" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="1485.0" dy="0">poor + blur/small_face</tspan></text><text x="1158" y="456" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="1158" dy="0">建档：否    匹配：低权重    超分：可尝试</tspan></text><rect x="1140" y="499" width="690" height="84" rx="14" fill="#FDE7E9" stroke="#D13438" stroke-width="2"/><text x="1485.0" y="530" font-size="18" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="1485.0" dy="0">poor + extreme_pose</tspan></text><text x="1158" y="559" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="1158" dy="0">建档：否    匹配：谨慎/拒绝    超分：否</tspan></text><rect x="1140" y="602" width="690" height="84" rx="14" fill="#F3F2F1" stroke="#605E5C" stroke-width="2"/><text x="1485.0" y="633" font-size="18" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="1485.0" dy="0">none</tspan></text><text x="1158" y="662" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="1158" dy="0">人脸不建档    人脸不匹配    人脸裁剪超分不可用</tspan></text><path d="M 1005 492 L 1110 445" fill="none" stroke="#605E5C" stroke-width="2.5" marker-end="url(#arrow)"/><text x="1057.5" y="460.5" font-size="13" font-weight="600" text-anchor="middle" fill="#333333"><tspan x="1057.5" dy="0">质量结果与标签</tspan></text><rect x="420" y="810" width="1440" height="540" rx="20" fill="transparent" stroke="#0C8599" stroke-width="3"/><text x="440" y="844" font-size="22" font-weight="700" text-anchor="start" fill="#111111"><tspan x="440" dy="0">④ 身份特征与多模态兜底</tspan></text><text x="440" y="870" font-size="13" font-weight="400" text-anchor="start" fill="#444444"><tspan x="440" dy="0">超分只是一种可选处理动作</tspan></text><rect x="450" y="885" width="350" height="145" rx="14" fill="#C5F0F5" stroke="#0C8599" stroke-width="2"/><text x="625.0" y="916" font-size="19" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="625.0" dy="0">原图识别路径</tspan></text><text x="468" y="945" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="468" dy="0">clear或不需要超分</tspan><tspan x="468" dy="22">对齐脸 → ArcFace / AdaFace</tspan><tspan x="468" dy="22">得到512维人脸特征</tspan></text><rect x="835" y="855" width="420" height="205" rx="14" fill="#E8DAEF" stroke="#5C2D91" stroke-width="2" stroke-dasharray="9 6"/><text x="1045.0" y="886" font-size="19" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="1045.0" dy="0">超分识别路径</tspan></text><text x="853" y="915" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="853" dy="0">can_superres=true</tspan><tspan x="853" dy="22">对齐脸 → GFPGAN / CodeFormer</tspan><tspan x="853" dy="22">超分后重新计算FIQA与清晰度</tspan><tspan x="853" dy="22">检查修复前后身份特征是否漂移</tspan><tspan x="853" dy="22">通过后再提ArcFace / AdaFace特征</tspan></text><rect x="1290" y="885" width="520" height="145" rx="14" fill="#C5F0F5" stroke="#0C8599" stroke-width="2"/><text x="1550.0" y="916" font-size="19" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="1550.0" dy="0">人脸参考库查询</tspan></text><text x="1308" y="945" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="1308" dy="0">人脸特征只与人脸特征比较</tspan><tspan x="1308" dy="22">达到固定身份匹配阈值 → 候选统一主体ID</tspan><tspan x="1308" dy="22">低于阈值 → 人脸路线拒绝复用</tspan></text><path d="M 800 955 L 1290 955" fill="none" stroke="#605E5C" stroke-width="2.5" marker-end="url(#arrow)"/><path d="M 1255 955 L 1290 955" fill="none" stroke="#605E5C" stroke-width="2.5" marker-end="url(#arrow)"/><path d="M 1465 1030 L 1465 1095" fill="none" stroke="#605E5C" stroke-width="2.5" marker-end="url(#arrow)"/><rect x="1080" y="1095" width="730" height="160" rx="14" fill="#DFF6DD" stroke="#107C10" stroke-width="2"/><text x="1445.0" y="1126" font-size="19" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="1445.0" dy="0">统一主体层融合</tspan></text><text x="1098" y="1155" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="1098" dy="0">人脸候选 + 人形ReID候选 + 步态候选</tspan><tspan x="1098" dy="22">各模态先在自己的向量库内比较，再映射到统一subject_id</tspan><tspan x="1098" dy="22">多路一致才加成；高置信冲突进入灰区并禁止写库</tspan></text><rect x="450" y="1100" width="570" height="150" rx="14" fill="#F3F2F1" stroke="#605E5C" stroke-width="2"/><text x="735.0" y="1131" font-size="19" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="735.0" dy="0">人脸none或人脸路线拒绝</tspan></text><text x="468" y="1160" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="468" dy="0">继续人物跟踪、人形ReID、步态识别</tspan><tspan x="468" dy="22">身份仍未知时输出“未识别人物”</tspan><tspan x="468" dy="22">事件理解仍描述其进入、停留、拿取物品等行为</tspan></text><path d="M 380 765 L 450 1170" fill="none" stroke="#605E5C" stroke-width="2.5" marker-end="url(#arrow)"/><text x="415.0" y="959.5" font-size="13" font-weight="600" text-anchor="middle" fill="#333333"><tspan x="415.0" dy="0">人脸不可用</tspan></text><path d="M 1020 1175 L 1080 1175" fill="none" stroke="#605E5C" stroke-width="2.5" marker-end="url(#arrow)"/><text x="1050.0" y="1167.0" font-size="13" font-weight="600" text-anchor="middle" fill="#333333"><tspan x="1050.0" dy="0">其他模态</tspan></text><rect x="40" y="900" width="340" height="375" rx="14" fill="#E8DAEF" stroke="#5C2D91" stroke-width="2" stroke-dasharray="9 6"/><text x="210.0" y="931" font-size="19" font-weight="700" text-anchor="middle" fill="#111111"><tspan x="210.0" dy="0">FIQA加载位置（建议）</tspan></text><text x="58" y="960" font-size="14" font-weight="400" text-anchor="start" fill="#111111"><tspan x="58" dy="0">配置入口：</tspan><tspan x="58" dy="22">app/core/config.py</tspan><tspan x="58" dy="22">FACE_FIQA_BACKEND</tspan><tspan x="58" dy="22"></tspan><tspan x="58" dy="22">模型加载：</tspan><tspan x="58" dy="22">app/face.py新增_ensure_fiqa()</tspan><tspan x="58" dy="22">进程内懒加载一次，不逐帧重复加载</tspan><tspan x="58" dy="22"></tspan><tspan x="58" dy="22">推理调用：</tspan><tspan x="58" dy="22">_deep_fiqa_score(aligned_face)</tspan><tspan x="58" dy="22">由assess_quality()消费</tspan><tspan x="58" dy="22"></tspan><tspan x="58" dy="22">当前状态：接口已留，模型未实现</tspan></text><path d="M 380 1030 L 755 360" fill="none" stroke="#5C2D91" stroke-width="2.5" marker-end="url(#arrow)" stroke-dasharray="7 5"/><text x="567.5" y="687.0" font-size="13" font-weight="600" text-anchor="middle" fill="#333333"><tspan x="567.5" dy="0">FIQA配置与模型</tspan></text><text x="950.0" y="1405" font-size="15" font-weight="600" text-anchor="middle" fill="#333333"><tspan x="950.0" dy="0">关键原则：FIQA负责“身份识别可用性总分”；规则分项负责解释原因；动作字段负责决定建档、匹配与超分。</tspan></text></svg>